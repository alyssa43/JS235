<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Exercises</title>
    <style>
      /* Part 3 */
      dl {
        border: 3px double #ccc;
        padding: 0.5em;
      }
      dt {
        float: left;
        clear: left;
        width: 100px;
        text-align: right;
        font-weight: bold;
        color: #f0595b;
      }
      dt::after {
        content: ":";
      }
      dd {
        margin: 0 0 0 110px;
        padding: 0 0 0.5em 0;
      }
      input[type="submit"] {
        color: #fff;
        background: #f0595b;
        border-color: #f0595b;
        border-radius: 5px;
        width: 100px;
        height: 50px;
      }

      /* Part 4 */
      .exercise4 form {
        padding: 1em 0;
      }
      .exercise4 fieldset {
        padding: 1.5em;
        width: 100%;
      }
      .exercise4 div {
        align-items: center;
        margin-bottom: 0.5em;
      }
      .exercise4 label {
        display: inline-block;
        width: 100px;
        text-align: right;
        font-weight: bold;
        color: #f0595b;
        margin-right: 10px;
      }
      .exercise4 input, select {
        flex: 1;
        padding: 5px;
        border: 1px solid #ccc;
        border-radius: 3px;
        max-width: 200px;
      }
      .exercise4 input[type="submit"],
      button {
        display: inline-block;
        margin-top: 15px;
        color: #fff;
        border-radius: 5px;
        width: 100px;
        height: 50px;
        border: none;
        cursor: pointer;
      }
      .exercise4 input[type="submit"] {
        background: #f0595b;
      }
      .exercise4 button {
        background: #5cafde;
      }
    </style>
  </head>
  <body>
    <div class="exercise2">
      <h3>Exercise 2:</h3>
      <a href="#">Click Here to fetch all schedules</a>
      <script src="./javascripts/exercise2.js"></script>
    </div>
    
    <br>
    <br>

    <div class="exercise3">
      <h3>Exercise 3:</h3>
      <form method="post" action="/api/staff_members">
        <dl>
          <dt>
            <label for="email">Email</label>
          </dt>
          <dd>
            <input type="email" id="email" name="email">
          </dd>
          <dt>
            <label for="name">Name</label>
          </dt>
          <dd>
            <input type="text" id="name" name="name">
          </dd>
        </dl>
        <input type="submit">
      </form>
      <script src="./javascripts/exercise3.js"></script>
    </div>
   
    <br>
    <br>

    <div class="exercise4">
      <h3>Exercise 4:</h3>
      <button id="btnAdd">Add more schedules</button>
      <form method="post" action="/api/schedules">
        <div id="schedules"></div>
        <input id="btnSubmit" type="submit">
      </form>
      <script src="./javascripts/exercise4.js"></script>
    </div>
  </body>
</html>
