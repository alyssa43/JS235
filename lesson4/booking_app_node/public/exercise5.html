<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Exercises</title>
    <style>
      #newStudentForm {
        background: #ccc;
        padding: 15px;
        margin-top: 15px;
      }
    </style>
  </head>
  <body>
    <h1>Schedules</h1>
    <form id="newBookingForm" method="post" action="/api/bookings">
      <label for="id">Please select one schedule</label>
      <select id="id" name="id">
        <!-- Add options here -->
      </select>
      <br>
      <label for="student_email">Email:</label>
      <input type="email" id="student_email" name="student_email" required>
      <input id="submitBtn" type="submit">
    </form>

    <form id="newStudentForm" method="post" action="/api/students" hidden="true">
      <h1>Please provide new student details</h1>

      <label for="email">Email:</label>
      <input type="email" name="email" id="email">
      <br>

      <label for="name">Name:</label>
      <input type="text" name="name" id="name">
      <br>

      <label for="booking_sequence">Booking Sequence:</label>
      <input type="text" name="booking_sequence" id="booking_sequence">
      <br>

      <input type="submit">
    </form>
  </body>
  <script src="./javascripts/exercise5.js"></script>
</html>
